name: SEO Content Pipeline

on:
  workflow_dispatch:
    inputs:
      skip_generate:
        description: 'Skip post generation step'
        required: false
        default: 'false'
        type: boolean
      skip_submit:
        description: 'Skip GSC submission step'
        required: false
        default: 'false'
        type: boolean
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: '0 8 * * 1'

env:
  NODE_VERSION: '22.12.0'
  GSC_SERVICE_ACCOUNT_KEY: ${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}
  GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
  SITE_URL: ${{ vars.SITE_URL || 'https://amazingplugins.com' }}

jobs:
  seo-pipeline:
    name: Run SEO Content Pipeline
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run keyword extraction
        if: ${{ !inputs.skip_generate }}
        run: npm run seo:keywords
        continue-on-error: true

      - name: Generate SEO posts
        if: ${{ !inputs.skip_generate }}
        run: npm run seo:generate
        continue-on-error: true

      - name: Submit to Google Search Console
        if: ${{ !inputs.skip_submit }}
        run: npm run seo:submit
        continue-on-error: true

      - name: Check for broken links
        run: npm run seo:fix
        continue-on-error: true

      - name: Generate GSC health report
        run: npm run seo:health
        continue-on-error: true

      - name: Upload health report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gsc-health-report
          path: gsc-health-report.json
          retention-days: 30

      - name: Upload broken links report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: broken-links-report
          path: broken-links-report.md
          retention-days: 30

      - name: Commit generated content
        if: ${{ !inputs.skip_generate && github.event_name == 'schedule' }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "chore: auto-update SEO content [skip ci]"
          git push
        continue-on-error: true
