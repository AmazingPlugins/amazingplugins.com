name: SEO GSC Health Check

on:
  workflow_dispatch:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'

env:
  NODE_VERSION: '22.12.0'
  GSC_SERVICE_ACCOUNT_KEY: ${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}
  GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
  SITE_URL: ${{ vars.SITE_URL || 'https://amazingplugins.com' }}

jobs:
  gsc-health:
    name: GSC Health Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run GSC health check
        run: npm run seo:health

      - name: Upload health report artifact
        uses: actions/upload-artifact@v4
        with:
          name: gsc-daily-health-${{ github.run_number }}
          path: gsc-health-report.json
          retention-days: 90

      - name: Check for critical issues
        if: failure()
        run: |
          echo "GSC Health Check Failed"
          echo "Please review the health report artifact"
          exit 1
