name: SEO Nightly Pipeline

on:
  schedule:
    # 1:00 AM Dhaka = 19:00 UTC
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  seo-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/seo-pipeline/generate-post.ts

      - name: Build site
        run: npm run build

      - name: Commit generated articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/
          git diff --cached --quiet || git commit -m "seo: auto-generate article(s)"

      - name: Submit to GSC
        env:
          GSC_SERVICE_ACCOUNT_KEY: ${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}
          GSC_SITE_URL: sc-domain:amazingplugins.com
          SITE_URL: https://amazingplugins.com
        run: npx tsx scripts/seo-pipeline/gsc-submit.ts

      - name: Commit GSC state
        run: |
          git add src/content/blog/ scripts/seo-pipeline/post-state.json
          git diff --cached --quiet || git commit -m "seo: mark posts as GSC submitted"

      - name: Push to main
        run: git push origin main
